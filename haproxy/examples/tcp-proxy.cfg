global
    log stdout format raw local0

defaults
    log    global
    mode   tcp
    option tcplog
    timeout connect 5s
    timeout client  60s
    timeout server  60s

# TCP load balancer for MySQL
frontend mysql_front
    bind *:3306
    default_backend mysql_back

backend mysql_back
    balance leastconn
    server db1 db1.internal:3306 check
    server db2 db2.internal:3306 check backup

# TCP load balancer for Redis
frontend redis_front
    bind *:6379
    default_backend redis_back

backend redis_back
    balance source
    server redis1 redis1.internal:6379 check
    server redis2 redis2.internal:6379 check

global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:80
    # Capture client IP
    http-request set-header X-Forwarded-For %[src]

    # Route /api/* to api backend, rest to web backend
    acl is_api path_beg /api/
    use_backend api_back if is_api
    default_backend web_back

backend web_back
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200
    server web1 web1.internal:3000 check inter 5s rise 2 fall 3
    server web2 web2.internal:3000 check inter 5s rise 2 fall 3

backend api_back
    balance leastconn
    option httpchk GET /api/health
    server api1 api1.internal:8080 check
    server api2 api2.internal:8080 check

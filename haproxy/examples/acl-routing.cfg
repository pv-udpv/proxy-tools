global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:80
    # ACL definitions
    acl host_api   hdr(host) -i api.example.com
    acl host_admin hdr(host) -i admin.example.com
    acl path_static path_beg /static/ /assets/
    acl method_post method POST

    # Block direct IP access
    acl has_host hdr(host) -m found
    http-request deny unless has_host

    # Routing rules
    use_backend static_back  if path_static
    use_backend api_back     if host_api
    use_backend admin_back   if host_admin
    default_backend web_back

backend static_back
    server cdn cdn.internal:8080 check

backend api_back
    balance leastconn
    server api1 api1.internal:3000 check
    server api2 api2.internal:3000 check

backend admin_back
    # Restrict to internal IPs only
    acl internal src 10.0.0.0/8 192.168.0.0/16
    http-request deny unless internal
    server admin admin.internal:4000 check

backend web_back
    balance roundrobin
    server web1 web1.internal:8080 check
    server web2 web2.internal:8080 check

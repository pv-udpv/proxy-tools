# Stream module: TCP/UDP proxy (requires --with-stream compile flag or nginx-full package)
stream {
    # TCP proxy: forward port 3306 to a remote MySQL
    upstream mysql_backend {
        server db.internal:3306;
    }

    server {
        listen 3306;
        proxy_pass mysql_backend;
        proxy_connect_timeout 5s;
        proxy_timeout        300s;
    }

    # TCP proxy: forward port 5432 to PostgreSQL
    upstream pg_backend {
        server pg.internal:5432;
    }

    server {
        listen 5432;
        proxy_pass pg_backend;
    }

    # UDP proxy: DNS forwarder
    upstream dns_upstream {
        server 8.8.8.8:53;
        server 1.1.1.1:53;
    }

    server {
        listen     5353 udp;
        proxy_pass dns_upstream;
    }
}

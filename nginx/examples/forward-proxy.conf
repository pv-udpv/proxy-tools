# HTTP forward proxy using the CONNECT method
# Requires: ngx_http_proxy_connect_module
# https://github.com/chobits/ngx_http_proxy_connect_module
#
# Build nginx with the module or use the patched image:
#   docker run --rm -it ubuntu/nginx-with-proxy-connect
#
# Usage (configure your browser/curl):
#   curl -x http://proxy.host:8888 https://example.com

http {
    # Allow CONNECT to any port (restrict to 443 in production)
    proxy_connect;
    proxy_connect_allow   443 80 8080 8443;
    proxy_connect_connect_timeout  10s;
    proxy_connect_data_timeout     60s;

    server {
        listen 8888;

        # Block access from non-allowed IPs
        # allow 10.0.0.0/8;
        # deny  all;

        # CONNECT tunnel (HTTPS through proxy)
        location / {
            proxy_pass http://$host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

services:
  frps:
    image: snowdreamtech/frps:latest
    container_name: frps
    restart: unless-stopped
    ports:
      - "7000:7000"     # frp server port (agent connections)
      - "7500:7500"     # frp dashboard
      - "8080:8080"     # HTTP vhost port
    volumes:
      - ./frps.toml:/etc/frp/frps.toml:ro

  frpc:
    image: snowdreamtech/frpc:latest
    container_name: frpc
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    depends_on:
      - frps
